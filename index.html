        /* Профиль */
        .profile {

        }
        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;

        }
        .username-name {
            font-size: 16px;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 2px;
            }
        .username-main {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }
        .bio {
            font-size: 14px;
            color: #9ca3af;
            line-height: 1.5;
        }

        /* Стили текстовых разделителей секций */
        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: #4b5563; 
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 24px;
            margin-bottom: 12px;
            text-align: center;
        }

        /* Списки кнопок внутри секций */
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 12px;
        }

        /* Двухколоночная сетка для последней секции (строго 50/50) */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 12px;
        }

        /* Кнопка-ссылка */
        .link-btn {
            display: flex;
            align-items: center;
            background-color: #181920;
            border: 1px solid #23262f;
            border-radius: 12px;
            padding: 14px 16px; 
            color: #ffffff;
            text-decoration: none;
            transition: background-color 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        border-color 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            width: 100%;
        }
        
        /* Квадратное SVG изображение (20х20px) */
        .link-btn-img {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            object-fit: contain; 
            margin-right: 20px; 
            flex-shrink: 0;
            filter: invert(1); 
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Контейнер для текста ссылки с защитой от переполнения */
        .link-btn-text {
            font-size: 15px;
            font-weight: 600;
            text-align: left;
            letter-spacing: -0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Стрелочка, прижатая к правому краю */
        .link-btn-arrow {
            margin-left: auto; 
            width: 16px;
            height: 16px;
            object-fit: contain;
            filter: invert(1); 
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Эффекты ховера */
        .link-btn:hover {
            background-color: #1c1d26;
            border-color: #3b3f4e;
            transform: scale(1.006); 
        }

        .link-btn:hover .link-btn-img {
            opacity: 0.4; 
        }
        .link-btn:hover .link-btn-arrow {
            opacity: 0.3;
        }
    </style>
</head>
