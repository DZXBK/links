        /* Двухколоночная сетка для последней секции (строго 50/50) */

        /* Кнопка-ссылка */

                        transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            width: 100%;
        }
        
        /* Квадратное SVG изображение (20х20px) */
        .link-btn-img {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            object-fit: contain; 
            margin-right: 20px; 
            flex-shrink: 0;
            filter: invert(1); 
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Контейнер для текста ссылки с защитой от переполнения */
        .link-btn-text {
            font-size: 15px;
            font-weight: 600;
            text-align: left;
            letter-spacing: -0.01em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Стрелочка, прижатая к правому краю */
        .link-btn-arrow {
            margin-left: auto; 
            width: 16px;
            height: 16px;
            object-fit: contain;
            filter: invert(1); 
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* Эффекты ховера */

            border-color: #3b3f4e;
            transform: scale(1.006); 
        }

        .link-btn:hover .link-btn-img {
            opacity: 0.4; 
        }
        .link-btn:hover .link-btn-arrow {
            opacity: 0.3;
        }
    </style>

    <script>
        let mouseX = null;
        let mouseY = null;
        
        // Определяем ПК-устройство
        const isPC = window.matchMedia('(pointer: fine)').matches;

        function updateSectionHighlights() {
            const titles = document.querySelectorAll('.section-title');
            const viewportCenterX = window.innerWidth / 2;
            const viewportCenterY = window.innerHeight / 2;
            
            titles.forEach(title => {
                const nextElem = title.nextElementSibling;
                if (!nextElem) return;
                
                const titleRect = title.getBoundingClientRect();
                const nextRect = nextElem.getBoundingClientRect();
                
                // Границы текущей секции
                const sectionTop = titleRect.top;
                const sectionBottom = nextRect.bottom;
                const sectionLeft = nextRect.left;
                const sectionRight = nextRect.right;
                
                // Текущие координаты (мышь для ПК, центр экрана для мобильных)
                const currentX = (isPC && mouseX !== null) ? mouseX : viewportCenterX;
                const currentY = (isPC && mouseY !== null) ? mouseY : viewportCenterY;
                
                let ratio = 0; // По умолчанию секция выключена (0)
                
                // 1. Проверяем строгое нахождение по вертикали
                if (currentY >= sectionTop && currentY <= sectionBottom) {
                    
                    // 2. Если по вертикали попали, рассчитываем расстояние по горизонтали
                    let distanceX = 0;
                    if (currentX < sectionLeft) {
                        distanceX = sectionLeft - currentX; // Курсор левее секции
                    } else if (currentX > sectionRight) {
                        distanceX = currentX - sectionRight; // Курсор правее секции
                    }
                    
                    // Расстояние в пикселях по бокам, в пределах которого заголовок плавно гаснет
                    const maxDistanceX = 150; 
                    
                    ratio = 1 - (distanceX / maxDistanceX);
                    if (ratio < 0) ratio = 0;
                    if (ratio > 1) ratio = 1;
                }
                
                // Смешивание цветов от базового #4b5563 (75, 85, 99) до активного #ffffff (255, 255, 255)
                const r = Math.round(75 + (255 - 75) * ratio);
                const g = Math.round(85 + (255 - 85) * ratio);
                const b = Math.round(99 + (255 - 99) * ratio);
                
                title.style.color = `rgb(${r}, ${g}, ${b})`;
            });
        }

        // Ловим движение мыши только на десктопах
        if (isPC) {
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                updateSectionHighlights();
            });
        }

        // Обработка скролла и изменения размеров окна
        window.addEventListener('scroll', updateSectionHighlights);
        window.addEventListener('resize', updateSectionHighlights);
        document.addEventListener('DOMContentLoaded', updateSectionHighlights);
        
        // Быстрый запуск для инициализации цветов
        updateSectionHighlights();
    </script>
